<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#CC0000"/>
  <!-- Hourglass top half: wide at top, narrows to waist -->
  <polygon points="5,4 27,4 18,14 14,14" fill="white"/>
  <!-- Waist -->
  <rect x="14" y="14" width="4" height="4" fill="white"/>
  <!-- Hourglass bottom half: widens from waist to base -->
  <polygon points="14,18 18,18 27,28 5,28" fill="white"/>
  <!-- Play triangle carved into the bottom section -->
  <polygon points="12.5,20 12.5,27 22,23.5" fill="#CC0000"/>
</svg>
